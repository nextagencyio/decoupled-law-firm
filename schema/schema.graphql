type Query {
  node(id: ID!, revision: ID): NodeUnion
  paragraph(id: ID!, revision: ID): ParagraphUnion
  term(id: ID!, revision: ID): TermUnion
  menu(name: MenuAvailable!): Menu
  info: SchemaInformation!
  nodeAttorneys(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeAttorneyConnection!
  nodeCaseStudies(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeCaseStudyConnection!
  nodeHomepages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeHomepageConnection!
  nodeNewsItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeNewsConnection!
  nodePages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePageConnection!
  nodePracticeAreas(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePracticeAreaConnection!
  paragraphStatItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphStatItemConnection!
  termTags(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): TermTagConnection!
  preview(id: ID!, token: String, langcode: String): NodeUnion
  route(path: String!, revision: ID): RouteUnion
}

union NodeUnion = NodeAttorney | NodeCaseStudy | NodeHomepage | NodeNews | NodePage | NodePracticeArea

type NodeAttorney implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  barAdmissions: String
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  education: Text
  email: String
  langcode: Language!
  office: String
  path: String
  phone: String
  photo: Image
  practiceArea: [TermUnion!]
  promote: Boolean!
  role: [TermUnion!]
  status: Boolean!
  sticky: Boolean!
  title: String!
}

interface NodeInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  created: DateTime!
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type DateTime {
  timestamp: Timestamp!
  timezone: TimeZone!
  offset: UtcOffset!
  time: Time!
}

type Language {
  id: ID
  name: String
  direction: String
}

interface EdgeNode {
  id: ID!
}

type TextSummary {
  value: String
  processed: Html
  format: String
  summary: Html
}

type Text {
  value: String
  processed: Html
  format: String
}

type Image {
  url: String!
  width: Int!
  height: Int!
  alt: String
  title: String
  size: Int!
  mime: String
  variations(styles: [ImageStyleAvailable]): [ImageStyleDerivative!]
}

enum ImageStyleAvailable {
  LARGE
  MEDIA_LIBRARY
  MEDIUM
  THUMBNAIL
  WIDE
}

type ImageStyleDerivative {
  name: String!
  url: String!
  width: Int!
  height: Int!
}

